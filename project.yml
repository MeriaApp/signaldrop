name: SignalDrop
options:
  bundleIdPrefix: com.meria
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 36D97ZTP6J
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "3"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
    Release:
      CODE_SIGN_IDENTITY: "Apple Development"

targets:
  SignalDrop:
    type: application
    platform: macOS
    sources:
      - path: Sources/SignalDrop
        type: group
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icns
        type: file
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleIdentifier: com.meria.signaldrop
        CFBundleName: SignalDrop
        CFBundleDisplayName: SignalDrop
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: APPL
        CFBundleExecutable: SignalDrop
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSLocationUsageDescription: "SignalDrop needs location access to display your WiFi network name. Your location is never stored or sent anywhere."
        NSLocationWhenInUseUsageDescription: "SignalDrop needs location access to display your WiFi network name. Your location is never stored or sent anywhere."
        NSHumanReadableCopyright: "Copyright © 2026 Jesse Meria. MIT License."
        CFBundleSupportedPlatforms:
          - MacOSX
        CFBundleDevelopmentRegion: en
        CFBundleInfoDictionaryVersion: "6.0"
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: App/SignalDrop.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.personal-information.location: true
        com.apple.developer.networking.wifi-info: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meria.signaldrop
        PRODUCT_NAME: SignalDrop
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "APPSTORE"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: CoreWLAN.framework
      - sdk: SystemConfiguration.framework
