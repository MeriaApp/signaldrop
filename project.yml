name: Dropout
options:
  bundleIdPrefix: com.meria
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 36D97ZTP6J
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
    Release:
      CODE_SIGN_IDENTITY: "Apple Distribution"

targets:
  Dropout:
    type: application
    platform: macOS
    sources:
      - path: Sources/Dropout
        type: group
    resources:
      - path: Resources/AppIcon.icns
    info:
      path: App/Info.plist
      properties:
        CFBundleIdentifier: com.meria.dropout
        CFBundleName: Dropout
        CFBundleDisplayName: Dropout
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Dropout
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSLocationUsageDescription: "Dropout needs location access to display your WiFi network name. Your location is never stored or sent anywhere."
        NSLocationWhenInUseUsageDescription: "Dropout needs location access to display your WiFi network name. Your location is never stored or sent anywhere."
        NSHumanReadableCopyright: "Copyright © 2026 Jesse Meria. MIT License."
        CFBundleSupportedPlatforms:
          - MacOSX
        CFBundleDevelopmentRegion: en
        CFBundleInfoDictionaryVersion: "6.0"
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: App/Dropout.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.personal-information.location: true
        com.apple.developer.networking.wifi-info: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meria.dropout
        PRODUCT_NAME: Dropout
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "APPSTORE"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: CoreWLAN.framework
      - sdk: SystemConfiguration.framework
