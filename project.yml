name: SignalDrop
options:
  bundleIdPrefix: com.meria
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

# Build configurations:
#   - Debug:          Local development; sandbox on, APPSTORE flag on.
#   - Release:        Mac App Store submission. Sandbox on, APPSTORE flag on,
#                     Sparkle code paths compiled out. Universal binary.
#   - ReleaseDirect:  Direct Distribution (DMG). No sandbox, no APPSTORE flag,
#                     Sparkle auto-update active. Universal binary, Developer-ID
#                     signed.
configs:
  Debug: debug
  Release: release
  ReleaseDirect: release

settings:
  base:
    DEVELOPMENT_TEAM: 36D97ZTP6J
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "5"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
    ReleaseDirect:
      # Direct-Distribution build uses Developer ID, signed manually.
      # build-app.sh overrides via xcodebuild flags for archive-time signing.
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_STYLE: Manual
      PROVISIONING_PROFILE_SPECIFIER: ""

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  SignalDrop:
    type: application
    platform: macOS
    sources:
      - path: Sources/SignalDrop
        type: group
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icns
        type: file
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleIdentifier: com.meria.signaldrop
        CFBundleName: SignalDrop
        CFBundleDisplayName: SignalDrop
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: APPL
        CFBundleExecutable: SignalDrop
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSLocationUsageDescription: "SignalDrop needs location access to display your WiFi network name. Your location is never stored or sent anywhere."
        NSLocationWhenInUseUsageDescription: "SignalDrop needs location access to display your WiFi network name. Your location is never stored or sent anywhere."
        NSHumanReadableCopyright: "Copyright © 2026 Jesse Meria. MIT License."
        CFBundleSupportedPlatforms:
          - MacOSX
        CFBundleDevelopmentRegion: en
        CFBundleInfoDictionaryVersion: "6.0"
        LSApplicationCategoryType: public.app-category.utilities
        # Sparkle — only used in ReleaseDirect (Direct Distribution) builds.
        # The App Store build never invokes Sparkle (gated by APPSTORE flag);
        # leaving these keys present is harmless dead data.
        SUFeedURL: https://jessemeria.com/signaldrop/appcast.xml
        SUPublicEDKey: "2udxMzvjniZyxXxJ3ZBK1Coglm9KQsuvon3nqaD3XWI="
        SUEnableInstallerLauncherService: true
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meria.signaldrop
        PRODUCT_NAME: SignalDrop
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG APPSTORE"
          ONLY_ACTIVE_ARCH: YES
          CODE_SIGN_ENTITLEMENTS: App/SignalDrop.entitlements
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "APPSTORE"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          # Universal binary for direct distribution + Mac App Store. Apple
          # promotes universal apps in App Store search ranking and Intel-Mac
          # users would otherwise see "Only works on Apple Silicon."
          ARCHS: "arm64 x86_64"
          ONLY_ACTIVE_ARCH: NO
          CODE_SIGN_ENTITLEMENTS: App/SignalDrop.entitlements
        ReleaseDirect:
          # No APPSTORE flag → Sparkle code compiles in.
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          ARCHS: "arm64 x86_64"
          ONLY_ACTIVE_ARCH: NO
          CODE_SIGN_ENTITLEMENTS: App/SignalDrop-DirectDistribution.entitlements
    dependencies:
      - sdk: CoreWLAN.framework
      - sdk: SystemConfiguration.framework
      - package: Sparkle
    postCompileScripts:
      - name: Strip Sparkle from App Store build
        script: ./Scripts/strip-sparkle-for-appstore.sh
        runOnlyWhenInstalling: false
        showEnvVars: false
